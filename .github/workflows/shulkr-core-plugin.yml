name: shulkr-core plugin

on:
  push:
    tags:
      - 'shulkr-core-v*'
    paths:
      - 'packages/shulkr-core-plugin/**'
      - '.github/workflows/shulkr-core-plugin.yml'
  pull_request:
    paths:
      - 'packages/shulkr-core-plugin/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/shulkr-core-plugin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build all platform jars
        run: ./gradlew --no-daemon paperJar foliaJar velocityJar waterfallJar
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shulkr-core-plugins
          path: packages/shulkr-core-plugin/build/libs/*.jar
